name: Build macOS

# Every push to a build branch produces installable artefacts.
# main → stable channel (maiTerm2). dev → dev channel (maiTerm3, side-by-side).
# Tags still fire so release cuts keep working.
on:
  push:
    branches: [main, dev]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Determine channel
        id: channel
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "product=maiTerm3" >> "$GITHUB_OUTPUT"
            echo "tauri_config_flag=--config src-tauri/tauri.channel-dev.conf.json" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "product=maiTerm2" >> "$GITHUB_OUTPUT"
            echo "tauri_config_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary needs both slices.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ steps.channel.outputs.channel }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # `--target universal-apple-darwin` builds both arch slices and lipo's them
      # together into one .dmg / .app that runs natively on Apple Silicon and Intel.
      - name: Build Tauri app (universal)
        run: npx tauri build --target universal-apple-darwin ${{ steps.channel.outputs.tauri_config_flag }}
        env:
          MAITERM_CHANNEL: ${{ steps.channel.outputs.channel == 'dev' && 'dev' || '' }}
          # No TAURI_SIGNING_* — the fork consumes upstream (Flexmark-signed)
          # updates and does not publish its own, so bundle.createUpdaterArtifacts
          # is false and no updater tarball is produced or signed.

      - name: Upload .dmg
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.channel.outputs.product }}-${{ steps.version.outputs.version }}-macos-dmg
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
