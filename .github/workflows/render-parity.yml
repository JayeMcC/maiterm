name: Render parity (debug vs release)

# Regression guard from the white-screen investigation (2026-07-03). Root
# cause: the dev-only tauri-plugin-log Webview target flooded the renderer at
# boot → web content process terminated → blank window. Debug ON → 1 colour,
# OFF → 136, release → 119 (render-parity + render-diagnose runs). Fixed by
# making that target opt-in (MAITERM_ENABLE_WEBVIEW_LOG). This guard rebuilds
# BOTH profiles and asserts each renders a non-blank window, so the class
# (a build-profile-specific blank) can't regress unseen.
#
# CI-only (visible windows steal focus — see LOCAL-FOCUS-AVOIDANCE-HISTORY.md).

on:
  workflow_dispatch:
  push:
    branches: ['dev']
    paths:
      - '.github/workflows/render-parity.yml'
      - 'tests/e2e/harness/render-probe.ts'
      - 'tests/e2e/harness/render-check.ts'
      - 'tests/e2e/harness/spawn.ts'
      - 'src-tauri/src/lib.rs'

jobs:
  render-parity:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Install E2E dependencies
        working-directory: tests/e2e
        run: npm install --no-audit --no-fund

      - name: Build DEBUG binary
        run: npx tauri build --debug --no-bundle
      - name: Probe DEBUG render
        working-directory: tests/e2e
        run: npx tsx harness/render-probe.ts "${GITHUB_WORKSPACE}/src-tauri/target/debug/aiterm" debug | tee /tmp/debug.txt

      - name: Build RELEASE binary
        run: npx tauri build --no-bundle
      - name: Probe RELEASE render
        working-directory: tests/e2e
        run: npx tsx harness/render-probe.ts "${GITHUB_WORKSPACE}/src-tauri/target/release/aiterm" release | tee /tmp/release.txt

      - name: Summary
        if: always()
        run: |
          echo "## Render parity" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/debug.txt /tmp/release.txt 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-parity-artifacts
          path: |
            /tmp/debug.txt
            /tmp/release.txt
          if-no-files-found: ignore
